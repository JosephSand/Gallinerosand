
<!DOCTYPE html>

    <script>
        tailwind.config = {
            theme: {

                    colors: {

    <style>
        /* Estilos CSS para Impresión Optimizada */
        @media print {

                background: white !important;

                font-size: 11pt !important;
                padding-bottom: 0 !important;

            /* Expandir el contenido para tomar todo el ancho */

                display: block !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;

                box-shadow: none !important;
            }
            /* Formatear tarjetas del Dashboard para un reporte ejecutivo */
            .print-report-grid {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 1.25rem !important;
                margin-bottom: 2rem !important;
            }
            .print-card {
                border: 1px solid #e7e5e4 !important;
                border-radius: 0.5rem !important;
                padding: 1rem !important;
                background: white !important;
            }
            /* Optimizar tablas */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                margin-top: 1.5rem !important;
            }
            th, td {
                border: 1px solid #d6d3d1 !important;
                padding: 8px 12px !important;
                text-align: left !important;
            }
            thead {
                background-color: #f5f5f4 !important;
            }
            /* Evitar saltos de página a mitad de elementos */
            tr, .print-card {
                page-break-inside: avoid !important;
            }
            h1, h2, h3 {
                page-break-after: avoid !important;
                color: #14532d !important;
            }
            /* Forzar visualización de colores de impresión */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Estilo general para scrollbars suaves */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4;

<body class="h-full flex flex-col antialiased bg-stone-50">

    <!-- CABECERA GLOBAL -->
    <header class="bg-earth-800 text-white px-4 md:px-8 py-3.5 flex items-center justify-between shadow-sm sticky top-0 z-40 no-print">

            <div>
                <h1 class="text-base md:text-lg font-bold tracking-tight text-white leading-none">Gallinero Sand</h1>

        <div class="flex items-center gap-2 text-xs text-stone-400 bg-earth-700/50 px-3 py-1.5 rounded-lg border border-earth-600/30">

            <span class="hidden sm:inline">Sistema de Registro Mensual</span>
            <span class="sm:hidden">Sand Pro</span>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="flex-1 flex flex-col min-w-0 pb-24">
        <!-- ÁREA DE CONTENIDO -->
        <div id="main-content" class="flex-1 p-4 md:p-8 max-w-7xl w-full mx-auto">
            <!-- CARGADO DINÁMICAMENTE POR JS -->
        </div>
    </main>

    <!-- MENÚ DE NAVEGACIÓN FIJADO EN LA PARTE INFERIOR (Estilo claro con opción activa en Negro Intenso) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 h-16 md:h-20 py-2 px-1 flex items-center justify-around z-40 no-print shadow-lg">
        <!-- Botón Dashboard -->
        <button onclick="navigate('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150">
            <i data-lucide="layout-dashboard" class="w-5 h-5 mb-0.5 md:w-6 md:h-6"></i>
            <span class="text-[9px] md:text-xs font-semibold">Dashboard</span>
        </button>
        <!-- Botón Población -->
        <button onclick="navigate('poblacion')" id="nav-poblacion" class="flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150">
            <i data-lucide="feather" class="w-5 h-5 mb-0.5 md:w-6 md:h-6"></i>
            <span class="text-[9px] md:text-xs font-semibold">Población</span>
        </button>
        <!-- Botón Doctor Pollo -->
        <button onclick="navigate('drpollo')" id="nav-drpollo" class="flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150">
            <i data-lucide="heart-pulse" class="w-5 h-5 mb-0.5 md:w-6 md:h-6"></i>

        <!-- Botón Rutinas -->
        <button onclick="navigate('rutinas')" id="nav-rutinas" class="flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150">
            <i data-lucide="calendar" class="w-5 h-5 mb-0.5 md:w-6 md:h-6"></i>

        <!-- Botón Finanzas -->
        <button onclick="navigate('finanzas')" id="nav-finanzas" class="flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150">
            <i data-lucide="dollar-sign" class="w-5 h-5 mb-0.5 md:w-6 md:h-6"></i>
            <span class="text-[9px] md:text-xs font-semibold">Finanzas</span>
        </button>
    </nav>

    <!-- SISTEMA DE MODAL PERSONALIZADO -->
    <div id="custom-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden no-print">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-stone-200 transform scale-100 transition-all duration-200">
            <div class="flex items-start gap-3">
                <div class="bg-amber-50 p-3 rounded-full text-amber-600 flex-shrink-0" id="modal-icon-container">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="text-lg font-bold text-stone-900" id="modal-title">Título</h3>
                    <p class="text-sm text-stone-500 mt-2" id="modal-body">Descripción del modal.</p>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">

                    Cancelar
                </button>
                <button id="modal-btn-confirm" class="px-4 py-2 bg-emerald-600 text-white hover:bg-emerald-700 rounded-xl font-semibold text-sm transition shadow-md">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <!-- NOTIFICACIONES TOAST -->
    <div id="toast" class="fixed bottom-20 md:bottom-24 right-4 bg-earth-800 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 z-50 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none no-print">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-brand-400" id="toast-icon"></i>
        <span id="toast-message" class="text-sm font-semibold">¡Operación exitosa!</span>
    </div>

    <!-- LOGICA DE LA APLICACIÓN (JAVASCRIPT CONSOLIDADO) -->
    <script>
        // 1. CONFIGURACIONES GLOBALES Y VARIABLES DE CATÁLOGO (DEFINIDAS UNA SOLA VEZ)
        const MONTHS = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        const QUESTIONS = [
            { id: 1, text: "¿Muestra cansancio severo, letargo o desgano extremo?" },
            { id: 2, text: "¿Tiene las plumas notablemente erizadas, aspecto encorvado o triste?" },
            { id: 3, text: "¿Presenta la cresta o barbillas pálidas, de color morado o desinfladas?" },
            { id: 4, text: "¿Tiene diarrea líquida constante, de color amarillo, verde o con restos de sangre?" },
            { id: 5, text: "¿Presenta estornudos, secreciones por la nariz/ojos o emite silbidos al respirar?" },
            { id: 6, text: "¿Ha disminuido o detenido de forma drástica la postura de huevos?" },
            { id: 7, text: "¿Tiene inapetencia severa (no come alimento balanceado ni bebe agua)?" },
            { id: 8, text: "¿Tiene ojos hinchados, con costras o los mantiene cerrados con frecuencia?" },
            { id: 9, text: "¿Muestra cojera evidente, parálisis de patas, cuello torcido o debilidad extrema en alas?" },
            { id: 10, text: "¿Detectas ácaros, piojillos o marcas de heridas por picaje en su piel/plumas?" },
            { id: 11, text: "¿El buche se siente excesivamente blando, hinchado o despide un olor ácido y fermentado?" },
            { id: 12, text: "¿Ha tenido una pérdida de peso acelerada, sintiendo el hueso del pecho (quilla) muy afilado?" },
            { id: 13, text: "¿Sientes su cuerpo o patas con una temperatura de calor alarmante al tacto (fiebre)?" },
            { id: 14, text: "¿Tiene temblores constantes en la cabeza o realiza giros extraños con el cuello?" },
            { id: 15, text: "¿Su cloaca está sucia, húmeda, obstruida o inflamada?" }
        ];

        // TAREAS OBTENIDAS DE LA GUÍA DE MANEJO DEL GALLINERO (Muestra de 16 tareas)
        const ROUTINE_TASKS = [
            // DIARIO
            { id: 'recolectar_huevos', text: 'Recolectar Huevos (AM/PM)', category: 'Diario' },
            { id: 'limpiar_arena_expres', text: 'Limpiar Arena (exprés)', category: 'Diario' },
            { id: 'agua_fresca_sombra', text: 'Agua Fresca / Sombra', category: 'Diario' },
            { id: 'contar_aves_noche', text: 'Contar Aves (noche)', category: 'Diario' },
            // SEMANAL
            { id: 'lavar_comederos_bebederos', text: 'Lavar Comederos/Bebederos', category: 'Semanal' },
            { id: 'rellenar_arena_nidos', text: 'Rellenar Arena y Nidos', category: 'Semanal' },
            { id: 'vinagre_manzana_agua', text: 'Vinagre de Manzana al agua', category: 'Semanal' },
            { id: 'revisar_ventiladores', text: 'Revisar Ventiladores', category: 'Semanal' },
            // QUINCENAL
            { id: 'revision_fisica_aleatoria', text: 'Revisión Física Aleatoria', category: 'Quincenal' },
            { id: 'limpiar_ventanas_mallas', text: 'Limpiar Ventanas/Mallas', category: 'Quincenal' },
            { id: 'cajon_bano_ceniza', text: 'Cajón de Baño de Ceniza', category: 'Quincenal' },
            { id: 'reparar_estructura', text: 'Reparar Estructura', category: 'Quincenal' },
            // MENSUAL
            { id: 'cernido_completo_arena', text: 'Cernido Completo de Arena', category: 'Mensual' },
            { id: 'desinfectar_paredes_perchas', text: 'Desinfectar Paredes/Perchas', category: 'Mensual' },
            { id: 'evaluar_desparasitacion', text: 'Evaluar Desparasitación', category: 'Mensual' },
            { id: 'suplemento_calcio', text: 'Suplemento de Calcio', category: 'Mensual' }
        ];

        // 2. ESTADO GLOBAL DE LA APLICACIÓN
        let state = {
            currentTab: 'dashboard',
            chickens: [],
            calendarTasks: {}, // YYYY-MM-DD -> { task_id: bool, eggsCollected: number }
            finances: {}, // YYYY-MM -> { alimento, cama, agua, med, mant, compra, ventaHuevos, ventaGallinas, otrosIngresos }
            currentMonth: new Date().getMonth(),
            currentYear: new Date().getFullYear(),
            selectedDay: new Date().getDate(),
            drPollo: {
                selectedChickenId: '',
                currentQuestionIndex: 0,
                answers: []
            },
            alertDismissed: false
        };

        // Valores por defecto para semillas de inicialización
        const DEFAULT_CHICKENS = [
            { id: 'c1', nombre: 'Clotilde', nacimiento: '2025-06-15', estado: 'Sana' },
            { id: 'c2', nombre: 'Pancracia', nacimiento: '2025-11-20', estado: 'En Tratamiento' },
            { id: 'c3', nombre: 'Turuleca', nacimiento: '2024-02-10', estado: 'Sana' },
            { id: 'c4', nombre: 'Filomena', nacimiento: '2026-03-01', estado: 'Sana' },
            { id: 'c5', nombre: 'Ramonita', nacimiento: '2025-09-01', estado: 'En Cuarentena' }
        ];

        const DEFAULT_CALENDAR = {
            '2026-05-01': { 'recolectar_huevos': true, 'limpiar_arena_expres': true, 'agua_fresca_sombra': true, 'contar_aves_noche': true, 'eggsCollected': 12 }
        };

        const DEFAULT_FINANCES = {
            '2026-05': {
                alimento: 150,
                cama: 45,
                agua: 30,
                med: 25,
                mant: 50,
                compra: 80,
                ventaHuevos: 240,
                ventaGallinas: 120,
                otrosIngresos: 15
            }
        };

        // 3. PERSISTENCIA DE DATOS (LOCALSTORAGE)
        function loadState() {
            const savedState = localStorage.getItem('gallinerosand_state');
            if (savedState) {
                try {
                    state = JSON.parse(savedState);
                    if (!state.chickens) state.chickens = [...DEFAULT_CHICKENS];
                    if (!state.calendarTasks) state.calendarTasks = {...DEFAULT_CALENDAR};
                    if (!state.finances) state.finances = {...DEFAULT_FINANCES};
                    if (state.currentMonth === undefined) state.currentMonth = new Date().getMonth();
                    if (state.currentYear === undefined) state.currentYear = new Date().getFullYear();
                    if (state.selectedDay === undefined) state.selectedDay = new Date().getDate();
                    if (!state.drPollo) state.drPollo = { selectedChickenId: '', currentQuestionIndex: 0, answers: [] };
                } catch (e) {
                    console.error("Error cargando LocalStorage, reiniciando estado.", e);
                    resetToDefaults();
                }
            } else {
                resetToDefaults();
            }
        }

        function resetToDefaults() {
            state.chickens = [...DEFAULT_CHICKENS];
            state.calendarTasks = {...DEFAULT_CALENDAR};
            state.finances = {...DEFAULT_FINANCES};
            state.currentTab = 'dashboard';
            saveState();
        }

        function saveState() {
            localStorage.setItem('gallinerosand_state', JSON.stringify(state));
        }

        // 4. SISTEMA DE NAVEGACIÓN Y ENRUTAMIENTO GENERAL
        function navigate(tabName) {
            state.currentTab = tabName;
            
            const navElements = ['dashboard', 'poblacion', 'drpollo', 'rutinas', 'finanzas'];
            navElements.forEach(item => {
                const el = document.getElementById(`nav-${item}`);
                if (el) {
                    if (item === tabName) {
                        el.className = "flex flex-col items-center justify-center flex-1 py-1 text-black font-black transition-all duration-150 scale-105";
                    } else {
                        el.className = "flex flex-col items-center justify-center flex-1 py-1 text-stone-400 hover:text-stone-600 transition-all duration-150 hover:scale-102";
                    }
                }
            });

            renderCurrentTab();
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCurrentTab() {
            const container = document.getElementById('main-content');
            if (state.currentTab === 'dashboard') {
                renderDashboard(container);
            } else if (state.currentTab === 'poblacion') {
                renderPoblacion(container);
            } else if (state.currentTab === 'drpollo') {
                renderDoctorPollo(container);
            } else if (state.currentTab === 'rutinas') {
                renderCalendarioView(container);
            } else if (state.currentTab === 'finanzas') {
                renderFinanzas(container);
            }
        }

        // 5. MÓDULO 1: DASHBOARD
        function renderDashboard(target) {
            const total = state.chickens.length;
            const sanas = state.chickens.filter(c => c.estado === 'Sana').length;
            const enfermas = state.chickens.filter(c => c.estado === 'Enferma').length;
            const cuarentena = state.chickens.filter(c => c.estado === 'En Cuarentena').length;
            const tratamiento = state.chickens.filter(c => c.estado === 'En Tratamiento').length;

            const selectedMonth = state.currentMonth;
            const selectedYear = state.currentYear;
            const mesNombre = getMonthName(selectedMonth);
            const taskSummary = getMonthTaskProgress(selectedYear, selectedMonth);

            // Cargar finanzas y recolecta de huevos
            const finObject = getMonthlyFinance(selectedYear, selectedMonth);
            const totals = calculateFinanceTotals(finObject);
            const huevosDelMes = getEggsCollectedInMonth(selectedYear, selectedMonth);

            // Alerta del día 30+
            const today = new Date();
            const esDiaTreinta = today.getDate() >= 30;
            const esMesActual = today.getMonth() === selectedMonth && today.getFullYear() === selectedYear;

            target.innerHTML = `
                <div id="dashboard-print-area" class="space-y-6">

                    <!-- ALERTA INTELIGENTE DÍA 30 -->
                    ${esDiaTreinta && esMesActual ? `
                        <div class="alert-print-banner bg-amber-500 text-stone-900 px-5 py-4 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4 border border-amber-400 shadow-md">
                            <div class="flex items-start gap-3">
                                <div class="p-2 bg-amber-600/30 rounded-xl mt-0.5"><i data-lucide="alert-triangle" class="w-5 h-5 text-stone-900"></i></div>
                                <div>
                                    <h4 class="font-black text-sm uppercase tracking-wide">¡Recordatorio de Cierre de Mes (Día 30+)!</h4>
                                    <p class="text-xs text-stone-800 font-medium mt-0.5">Se recomienda imprimir el Dashboard para guardar la información antes de reiniciar las tareas de este mes.</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="imprimirReporte()" class="px-4 py-2 bg-stone-900 hover:bg-black text-white rounded-xl text-xs font-bold transition flex items-center gap-1.5 shadow-sm">
                                    <i data-lucide="printer" class="w-4 h-4"></i> Imprimir Reporte
                                </button>
                                <button onclick="triggerMonthlyReset()" class="px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-xl text-xs font-bold transition">
                                    Reiniciar Mes
                                </button>
                            </div>
                        </div>
                    ` : ''}

                    <!-- Cabecera de vista con selectores de Mes y Año -->
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 border-b border-stone-200/80 pb-5">
                        <div>
                            <span class="text-xs font-bold text-brand-700 uppercase tracking-widest">Resumen General</span>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-stone-900 tracking-tight">Gallinero Sand</h2>
                            <p class="text-sm text-stone-500 mt-1">Control de operaciones y balance financiero por períodos.</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 no-print">
                            <label class="text-xs font-bold text-stone-400 uppercase tracking-wider font-semibold">Ver Período:</label>
                            <select onchange="selectDashboardMonth(this.value)" class="bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm">
                                ${MONTHS.map((m, idx) => `<option value="${idx}" ${idx === selectedMonth ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                            <select onchange="selectDashboardYear(this.value)" class="bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm">
                                ${[2025, 2026, 2027, 2028].map(y => `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}</option>`).join('')}
                            </select>
                            <button onclick="imprimirReporte()" class="bg-brand-700 hover:bg-brand-800 text-white font-bold py-2 px-3.5 rounded-xl transition shadow-lg shadow-brand-900/10 text-sm flex items-center gap-1.5 h-10">
                                <i data-lucide="printer" class="w-4 h-4"></i>
                                Imprimir
                            </button>
                        </div>
                    </div>

                    <!-- Cuadrícula de Métricas de Población y Producción -->
                    <div class="grid grid-cols-2 lg:grid-cols-6 gap-4 print-report-grid">
                        <div class="bg-white border border-stone-200/80 p-5 rounded-2xl shadow-sm hover:shadow transition print-card">
                            <div class="flex items-center justify-between text-stone-400">
                                <span class="text-xs font-bold uppercase tracking-wider">Total Aves</span>
                                <div class="p-2 bg-stone-100 rounded-lg text-stone-600"><i data-lucide="feather" class="w-4 h-4"></i></div>
                            </div>
                            <p class="text-3xl font-extrabold text-stone-900 mt-3">${total}</p>
                            <p class="text-xs text-stone-500 mt-1">Población total</p>
                        </div>

                        <div class="bg-white border border-stone-200/80 p-5 rounded-2xl shadow-sm hover:shadow transition print-card">
                            <div class="flex items-center justify-between text-green-500">
                                <span class="text-xs font-bold uppercase tracking-wider text-stone-400">Sanas</span>
                                <div class="p-2 bg-green-50 rounded-lg"><i data-lucide="smile" class="w-4 h-4"></i></div>
                            </div>
                            <p class="text-3xl font-extrabold text-green-700 mt-3">${sanas}</p>
                            <p class="text-xs text-green-600 mt-1 font-semibold">${total > 0 ? Math.round((sanas/total)*100) : 0}% del total</p>
                        </div>

                        <div class="bg-white border border-stone-200/80 p-5 rounded-2xl shadow-sm hover:shadow transition print-card">
                            <div class="flex items-center justify-between text-red-500">
                                <span class="text-xs font-bold uppercase tracking-wider text-stone-400">Enfermas</span>
                                <div class="p-2 bg-red-50 rounded-lg"><i data-lucide="frown" class="w-4 h-4"></i></div>
                            </div>

        // CÁLCULOS DINÁMICOS DE EDAD
        function calculateAge(birthdateStr) {
            const birth = new Date(birthdateStr);
            const now = new Date();
            let diffMs = now - birth;
            if (isNaN(diffMs) || diffMs < 0) return 'Invalida';

            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffWeeks = Math.floor(diffDays / 7);
            const diffMonths = Math.floor(diffDays / 30.43);

            if (diffMonths >= 1) {
                const remainingWeeks = Math.floor((diffDays % 30.43) / 7);
                let text = `${diffMonths} ${diffMonths === 1 ? 'mes' : 'meses'}`;
                if (remainingWeeks > 0) {
                    text += ` y ${remainingWeeks} ${remainingWeeks === 1 ? 'sem' : 'sems'}`;
                }
                return text;
            } else {
                return `${diffWeeks} ${diffWeeks === 1 ? 'semana' : 'semanas'}`;
            }
        }

        function getAgeInMonths(birthdateStr) {
            const birth = new Date(birthdateStr);
            const now = new Date();
            let diffMs = now - birth;
            if (isNaN(diffMs) || diffMs < 0) return 0;
            return diffMs / (1000 * 60 * 60 * 24 * 30.43);
        }

        // GENERADOR DE LÍNEA DE TIEMPO VISUAL
        function renderVisualTimeline(ageMonths) {
            const maxRange = 72;
            const percent = Math.min(100, (ageMonths / maxRange) * 100);

            let markerColor = "bg-amber-500";
            if (ageMonths >= 5 && ageMonths < 36) {
                markerColor = "bg-brand-600";
            } else if (ageMonths >= 36) {
                markerColor = "bg-stone-400";
            }

            return `
                <div class="space-y-1.5 w-full">
                    <div class="relative w-full h-3.5 bg-stone-100 rounded-full border border-stone-200 overflow-hidden flex">
                        <!-- Crecimiento (0-5 meses) -->
                        <div class="h-full bg-amber-100 border-r border-amber-200" style="width: 7%"></div>
                        <!-- Edad Productiva (5-36 meses) -->
                        <div class="h-full bg-emerald-100 border-r border-emerald-200" style="width: 43%"></div>
                        <!-- Retiro / Vejez (36-72 meses) -->
                        <div class="h-full bg-stone-200" style="width: 50%"></div>

                        <!-- Indicador de la gallina -->
                        <div class="absolute h-full w-2.5 ${markerColor} top-0 rounded-full shadow border border-white" style="left: calc(${percent}% - 5px)" title="Edad actual: ${Math.round(ageMonths)} meses"></div>
                    </div>
                    <div class="flex justify-between text-[9px] text-stone-400 font-bold px-0.5">
                        <span class="text-amber-600">Crecer (0-5m)</span>
                        <span class="text-emerald-700">Puesta (5-36m)</span>
                        <span class="text-stone-500">Retiro (36m+)</span>
                    </div>
                </div>
            `;
        }

        function selectCalendarDay(day) {

        function changeMonth(dir) {
            let m = state.currentMonth + dir;
            let y = state.currentYear;
            if (m < 0) {
                m = 11;
                y--;
            } else if (m > 11) {
                m = 0;
                y++;
            }
            state.currentMonth = m;
            state.currentYear = y;
            state.selectedDay = 1;
            renderCurrentTab();
            lucide.createIcons();
        }

        function toggleTaskStatus(dateKey, taskId, isChecked) {
            if (!state.calendarTasks[dateKey]) {
                state.calendarTasks[dateKey] = {};
            }
            state.calendarTasks[dateKey][taskId] = isChecked;
            saveState();
            renderCurrentTab();
            lucide.createIcons();
        }

        function markAllTasksComplete(dateKey, isComplete) {
            const dailyTasksList = getTasksForDate(state.currentYear, state.currentMonth, state.selectedDay);
            if (!state.calendarTasks[dateKey]) {
                state.calendarTasks[dateKey] = {};
            }
            dailyTasksList.forEach(t => {
                state.calendarTasks[dateKey][t.id] = isComplete;
            });
            saveState();
            showToast(isComplete ? "¡Todas las tareas marcadas como realizadas!" : "Tareas limpiadas.");
            renderCurrentTab();
            lucide.createIcons();
        }

        function saveEggsCollected(dateKey, val) {
            if (!state.calendarTasks[dateKey]) {
                state.calendarTasks[dateKey] = {};
            }
            const count = parseInt(val);
            state.calendarTasks[dateKey].eggsCollected = isNaN(count) ? 0 : count;
            
            if (count > 0) {
                state.calendarTasks[dateKey]['recolectar_huevos'] = true;
            } else if (count === 0) {
                state.calendarTasks[dateKey]['recolectar_huevos'] = false;
            }
            saveState();
        }

        function handleEggInputBlur() {
            renderCurrentTab();
            lucide.createIcons();
        }

        function isDayComplete(year, month, day) {
            const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const requiredTasks = getTasksForDate(year, month, day);
            const userProgress = state.calendarTasks[dateKey] || {};

            return requiredTasks.every(task => userProgress[task.id] === true);
        }

        function getMonthTaskProgress(year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;
            
            let totalTasksCount = 0;
            let completedTasksCount = 0;
            let incompleteDays = 0;

            const limitDay = isCurrentMonth ? today.getDate() : daysInMonth;

            for (let d = 1; d <= daysInMonth; d++) {
                const tasks = getTasksForDate(year, month, d);
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const userProgress = state.calendarTasks[dateKey] || {};

                const tasksForThisDay = tasks.length;
                let doneForThisDay = 0;

                tasks.forEach(t => {
                    if (userProgress[t.id] === true) {
                        completedTasksCount++;
                        doneForThisDay++;
                    }
                });

                totalTasksCount += tasksForThisDay;

                if (d <= limitDay) {
                    if (doneForThisDay < tasksForThisDay) {
                        incompleteDays++;
                    }
                }
            }

            return {
                total: totalTasksCount,
                completed: completedTasksCount,
                percentage: totalTasksCount > 0 ? Math.round((completedTasksCount / totalTasksCount) * 100) : 0,
                incompleteDays: incompleteDays
            };
        }

        // ASIGNADOR DE TAREAS POR DÍA DE LA SEMANA SEGÚN REGLAS ESTIPULADAS
        function getTasksForDate(year, month, day) {
            const dateObj = new Date(year, month, day);
            const dayOfWeek = dateObj.getDay();

            let tasks = [];
            
            // DIARIOS: Siempre se asignan a todos los días
            tasks.push(ROUTINE_TASKS[0], ROUTINE_TASKS[1], ROUTINE_TASKS[2], ROUTINE_TASKS[3]);

            if (dayOfWeek === 1) { // Si es lunes
                // Buscamos todos los lunes del mes actual para aplicar las reglas específicas
                const mondays = [];
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    if (new Date(year, month, d).getDay() === 1) {
                        mondays.push(d);
                    }
                }

                // SEMANALES: Cada Lunes
                tasks.push(ROUTINE_TASKS[4], ROUTINE_TASKS[5], ROUTINE_TASKS[6], ROUTINE_TASKS[7]);

                // QUINCENALES: Cada dos Lunes (1er lunes, 3er lunes, 5to lunes si existe)
                const mondayIndex = mondays.indexOf(day);
                if (mondayIndex !== -1 && mondayIndex % 2 === 0) {
                    tasks.push(ROUTINE_TASKS[8], ROUTINE_TASKS[9], ROUTINE_TASKS[10], ROUTINE_TASKS[11]);
                }

                // MENSUALES: El último lunes del mes
                if (mondays.length > 0 && day === mondays[mondays.length - 1]) {
                    tasks.push(ROUTINE_TASKS[12], ROUTINE_TASKS[13], ROUTINE_TASKS[14], ROUTINE_TASKS[15]);
                }
            }

            return tasks;
        }

        // 9. MÓDULO 5: FINANZAS

            const selectedMonth = state.currentMonth;
            const selectedYear = state.currentYear;
            const mesNombre = getMonthName(selectedMonth);

            const finObject = getMonthlyFinance(selectedYear, selectedMonth);
            const totals = calculateFinanceTotals(finObject);

            target.innerHTML = `
                <div class="space-y-6">
                    <!-- Cabecera de Finanzas -->
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-stone-200/80 pb-5 no-print">
                        <div>
                            <span class="text-xs font-bold text-brand-700 uppercase tracking-widest">Control Contable</span>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-stone-900 tracking-tight">Finanzas - Gallinero Sand</h2>
                            <p class="text-sm text-stone-500 mt-1">Registra detalladamente gastos e ingresos mensuales para obtener el balance neto.</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-bold text-stone-400 uppercase tracking-wider">Período Contable:</label>
                            <select onchange="selectFinancesMonth(this.value)" class="bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm">
                                ${MONTHS.map((m, idx) => `<option value="${idx}" ${idx === selectedMonth ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                            <select onchange="selectFinancesYear(this.value)" class="bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm font-bold text-stone-700 focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm">
                                ${[2025, 2026, 2027, 2028].map(y => `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <!-- Resumen de Totales e Indicadores -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 no-print">
                        <div class="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl">
                            <span class="text-xs font-bold uppercase tracking-wider text-emerald-700">Total Ingresos (${mesNombre})</span>
                            <p class="text-2xl font-black text-emerald-950 mt-1" id="tot-ingresos-display">$${totals.ingresos.toLocaleString()}</p>
                        </div>
                        <div class="bg-red-50 border border-red-200 p-5 rounded-2xl">
                            <span class="text-xs font-bold uppercase tracking-wider text-red-700">Total Gastos (${mesNombre})</span>
                            <p class="text-2xl font-black text-red-950 mt-1" id="tot-gastos-display">$${totals.gastos.toLocaleString()}</p>
                        </div>
                        <div class="${totals.ganancia >= 0 ? 'bg-emerald-900 text-white' : 'bg-red-900 text-white'} p-5 rounded-2xl transition duration-150">
                            <span class="text-xs font-bold uppercase tracking-wider opacity-80">Ganancia Neta (${mesNombre})</span>
                            <p class="text-2xl font-black mt-1" id="tot-ganancia-display">$${totals.ganancia.toLocaleString()}</p>
                        </div>
                    </div>

                    <!-- Formularios de Gastos e Ingresos -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- GASTOS -->
                        <div class="bg-white border border-stone-200/80 p-6 rounded-2xl shadow-sm space-y-4">
                            <div class="flex items-center gap-2 border-b border-stone-100 pb-3 text-red-700">
                                <i data-lucide="trending-down" class="w-5 h-5"></i>
                                <h3 class="text-lg font-bold text-stone-950">Gastos</h3>
                            </div>
                            
                            <div class="space-y-3.5">
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Alimento ($)</label>
                                    <input type="number" min="0" value="${finObject.alimento || ''}" oninput="updateFinanceField('alimento', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Cama y aserrín ($)</label>
                                    <input type="number" min="0" value="${finObject.cama || ''}" oninput="updateFinanceField('cama', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Agua y electricidad ($)</label>
                                    <input type="number" min="0" value="${finObject.agua || ''}" oninput="updateFinanceField('agua', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Medicamentos ($)</label>
                                    <input type="number" min="0" value="${finObject.med || ''}" oninput="updateFinanceField('med', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Mantenimiento ($)</label>
                                    <input type="number" min="0" value="${finObject.mant || ''}" oninput="updateFinanceField('mant', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Compra de gallinas nuevas ($)</label>
                                    <input type="number" min="0" value="${finObject.compra || ''}" oninput="updateFinanceField('compra', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                </div>
                                <div class="border-t border-stone-100 pt-3 flex justify-between items-center text-sm font-bold text-stone-800">
                                    <span>• Total Gastos:</span>
                                    <span class="text-red-700" id="subtotal-gastos">$${totals.gastos.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>

                        <!-- INGRESOS -->
                        <div class="bg-white border border-stone-200/80 p-6 rounded-2xl shadow-sm space-y-4">
                            <div class="flex items-center gap-2 border-b border-stone-100 pb-3 text-emerald-700">
                                <i data-lucide="trending-up" class="w-5 h-5"></i>
                                <h3 class="text-lg font-bold text-stone-950">Ingresos</h3>
                            </div>
                            
                            <div class="space-y-3.5 flex-1 flex flex-col justify-between">
                                <div class="space-y-3.5">
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Venta de huevos ($)</label>
                                        <input type="number" min="0" value="${finObject.ventaHuevos || ''}" oninput="updateFinanceField('ventaHuevos', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Venta de gallinas ($)</label>
                                        <input type="number" min="0" value="${finObject.ventaGallinas || ''}" oninput="updateFinanceField('ventaGallinas', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5">• Otros ingresos ($)</label>
                                        <input type="number" min="0" value="${finObject.otrosIngresos || ''}" oninput="updateFinanceField('otrosIngresos', this.value)" placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                    </div>
                                    <div class="border-t border-stone-100 pt-3 flex justify-between items-center text-sm font-bold text-stone-800">
                                        <span>• Total Ingresos:</span>
                                        <span class="text-emerald-700" id="subtotal-ingresos">$${totals.ingresos.toLocaleString()}</span>
                                    </div>
                                </div>

                                <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 flex items-center gap-2 text-stone-500 text-xs font-semibold mt-6">
                                    <i data-lucide="check-circle" class="w-4.5 h-4.5 text-brand-600"></i>
                                    Guardado automático activado en Gallinero Sand.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectFinancesMonth(val) {
            state.currentMonth = parseInt(val);
            renderCurrentTab();
            lucide.createIcons();
        }

        // CONTROL DE DATOS Y ENLACES
        function selectFinancesYear(val) {
            state.currentYear = parseInt(val);
            renderCurrentTab();
            lucide.createIcons();
        }

        function updateFinanceField(field, value) {
            const selectedMonth = state.currentMonth;
            const selectedYear = state.currentYear;
            const finObject = getMonthlyFinance(selectedYear, selectedMonth);
            
            const numVal = parseFloat(value);
            finObject[field] = isNaN(numVal) ? 0 : numVal;
            
            saveState();

            const updatedTotals = calculateFinanceTotals(finObject);
            const totIng = document.getElementById('tot-ingresos-display');
            const totGas = document.getElementById('tot-gastos-display');
            const totGan = document.getElementById('tot-ganancia-display');
            const subGas = document.getElementById('subtotal-gastos');
            const subIng = document.getElementById('subtotal-ingresos');

            if (totIng) totIng.textContent = `$${updatedTotals.ingresos.toLocaleString()}`;
            if (totGas) totGas.textContent = `$${updatedTotals.gastos.toLocaleString()}`;
            if (subGas) subGas.textContent = `$${updatedTotals.gastos.toLocaleString()}`;
            if (subIng) subIng.textContent = `$${updatedTotals.ingresos.toLocaleString()}`;
            if (totGan) {
                totGan.textContent = `$${updatedTotals.ganancia.toLocaleString()}`;
                const parent = totGan.parentElement;
                if (updatedTotals.ganancia >= 0) {
                    parent.className = "bg-emerald-900 text-white p-5 rounded-2xl transition duration-150";
                } else {
                    parent.className = "bg-red-900 text-white p-5 rounded-2xl transition duration-150";
                }
            }
        }

        function getMonthlyFinance(year, month) {
            const key = `${year}-${String(month + 1).padStart(2, '0')}`;
            if (!state.finances[key]) {
                state.finances[key] = {
                    alimento: 0,
                    cama: 0,
                    agua: 0,
                    med: 0,
                    mant: 0,
                    compra: 0,
                    ventaHuevos: 0,
                    ventaGallinas: 0,
                    otrosIngresos: 0
                };
            }
            return state.finances[key];
        }

        function calculateFinanceTotals(finObject) {
            const gastos = (finObject.alimento || 0) + 
                           (finObject.cama || 0) + 
                           (finObject.agua || 0) + 
                           (finObject.med || 0) + 
                           (finObject.mant || 0) + 
                           (finObject.compra || 0);
            
            const ingresos = (finObject.ventaHuevos || 0) + 
                             (finObject.ventaGallinas || 0) + 
                             (finObject.otrosIngresos || 0);
            
            const ganancia = ingresos - gastos;

            return { gastos, ingresos, ganancia };
        }

        function getEggsCollectedInMonth(year, month) {
            let total = 0;
            const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
            if (state && state.calendarTasks) {
                for (const dateKey in state.calendarTasks) {
                    if (dateKey.startsWith(prefix) && state.calendarTasks[dateKey]) {
                        const val = state.calendarTasks[dateKey].eggsCollected;
                        if (val !== undefined && val !== null) {
                            total += parseInt(val) || 0;
                        }
                    }
                }
            }
            return total;
        }

        // 10. FUNCIONES AUXILIARES DE FORMATO E INTERFAZ
        function getMonthName(monthIdx) {
            return MONTHS[monthIdx];
        }

        function formatDateString(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        // 11. MANEJADORES DE DIÁLOGOS DE CONFIRMACIÓN Y TOASTS
        function showCustomModal(options) {
            const modal = document.getElementById('custom-modal');
            const titleEl = document.getElementById('modal-title');
            const bodyEl = document.getElementById('modal-body');
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const btnCancel = document.getElementById('modal-btn-cancel');

            titleEl.textContent = options.title || 'Atención';
            bodyEl.textContent = options.text || '';

            btnConfirm.onclick = () => {
                modal.classList.add('hidden');
                if (options.onConfirm) options.onConfirm();
            };

            if (options.showCancel) {
                btnCancel.classList.remove('hidden');
                btnCancel.onclick = () => {
                    modal.classList.add('hidden');
                    if (options.onCancel) options.onCancel();
                };
            } else {
                btnCancel.classList.add('hidden');
            }

            modal.classList.remove('hidden');
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            const iconEl = document.getElementById('toast-icon');

            msgEl.textContent = message;

            if (type === 'success') {
                iconEl.setAttribute('data-lucide', 'check-circle-2');
                iconEl.className = "w-5 h-5 text-brand-400";
            } else {
                iconEl.setAttribute('data-lucide', 'alert-circle');
                iconEl.className = "w-5 h-5 text-red-400";
            }
            lucide.createIcons();

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // 12. IMPRESIÓN SENSITIVA
        function imprimirReporte() {
            document.body.classList.add('print-dashboard');
            window.print();
            
            setTimeout(() => {
                document.body.classList.remove('print-dashboard');
            }, 1000);
        }

        function imprimirRegistroPoblacion() {
            document.body.classList.add('print-poblacion');
            window.print();
            
            setTimeout(() => {
                document.body.classList.remove('print-poblacion');
            }, 1000);
        }

        // 13. INICIALIZACIÓN COMPLETA AL CARGAR EL DOM
        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            navigate('dashboard');
            
            // Modal de aviso al cargar el Dashboard en día 30+
            const today = new Date();
            if (today.getDate() >= 30 && !state.alertDismissed) {
                setTimeout(() => {
                    showCustomModal({
                        title: "Sugerencia de Cierre de Mes",
                        text: "Hemos detectado que te encuentras en el día 30 o superior del mes en curso. Te sugerimos imprimir el reporte completo de tu Dashboard para respaldar tu información contable y operativa antes de vaciar los datos transaccionales.",
                        showCancel: false,
                        onConfirm: () => {
                            state.alertDismissed = true;
                            saveState();
                        }
                    });
                }, 800);
            }
        });
    </script>
</body>
</html>
